name: Wiki Sync

on:
  push:
    branches:
      - main
    paths:
      - 'wiki/**'

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Prepare wiki checkout
        run: |
          git clone https://x-access-token:${{ secrets.WIKI_TOKEN }}@github.com/Nightw4re/vitae.wiki.git wiki-repo
          rm -rf wiki-repo/*
          cp -r wiki/* wiki-repo/

      - name: Configure wiki metadata
        run: |
          cd wiki-repo
          if [ -f _Sidebar.md ]; then
            git add _Sidebar.md
          fi

      - name: Commit and push wiki
        run: |
          cd wiki-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No wiki changes"
            exit 0
          fi
          git commit -m "docs: sync wiki from main repo"
          git push origin HEAD:master
