name: Deploy

env:
  MC_VERSION: 1.21.1

on:
  push:
    branches:
      - main
    paths:
      - 'gradle.properties'

permissions:
  contents: write

jobs:
  version_check:
    runs-on: ubuntu-latest
    outputs:
      current: ${{ steps.version_check.outputs.current }}
      changed: ${{ steps.version_check.outputs.changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - name: Check version changed
        id: version_check
        run: |
          CURRENT=$(grep '^mod_version' gradle.properties | cut -d= -f2)
          PREVIOUS=$(git show HEAD~1:gradle.properties 2>/dev/null | grep '^mod_version' | cut -d= -f2 || echo "")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: version_check
    if: needs.version_check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      current: ${{ steps.version.outputs.current }}
      changelog: ${{ steps.changelog.outputs.content }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - name: Export version
        id: version
        run: echo "current=${{ needs.version_check.outputs.current }}" >> $GITHUB_OUTPUT

      - name: Set up Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v4
        with:
          java-version: 21
          distribution: temurin

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Build
        run: gradle build --no-daemon

      - name: Validate release payload
        run: |
          JAR="build/libs/vitae-neoforge-${{ env.MC_VERSION }}-${{ needs.version_check.outputs.current }}.jar"
          if [ ! -f "$JAR" ]; then
            echo "Expected release jar not found: $JAR"
            exit 1
          fi
          if [ ! -s "$JAR" ]; then
            echo "Release jar is empty: $JAR"
            exit 1
          fi
          if [ -z "${{ steps.changelog.outputs.content }}" ]; then
            echo "Changelog is empty"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: v${{ needs.version_check.outputs.current }}
          name: Vitae NeoForge v${{ env.MC_VERSION }}-${{ needs.version_check.outputs.current }}
          body: ${{ steps.changelog.outputs.content }}
          files: build/libs/vitae-neoforge-${{ env.MC_VERSION }}-${{ needs.version_check.outputs.current }}.jar

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vitae-neoforge-${{ env.MC_VERSION }}-${{ needs.version_check.outputs.current }}
          path: build/libs/vitae-neoforge-${{ env.MC_VERSION }}-${{ needs.version_check.outputs.current }}.jar

  publish_curseforge:
    needs: build
    if: needs.build.outputs.current != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: vitae-neoforge-${{ env.MC_VERSION }}-${{ needs.build.outputs.current }}
          path: build/libs

      - name: Publish to CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: build/libs/vitae-neoforge-${{ env.MC_VERSION }}-${{ needs.build.outputs.current }}.jar
          name: Vitae NeoForge v${{ env.MC_VERSION }}-${{ needs.build.outputs.current }}
          version: ${{ needs.build.outputs.current }}
          version-type: release
          changelog: ${{ needs.build.outputs.changelog }}
          loaders: neoforge
          game-versions: 1.21.1
          java: 21

  publish_modrinth:
    needs: build
    if: needs.build.outputs.current != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: vitae-neoforge-${{ env.MC_VERSION }}-${{ needs.build.outputs.current }}
          path: build/libs

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: build/libs/vitae-neoforge-${{ env.MC_VERSION }}-${{ needs.build.outputs.current }}.jar
          name: Vitae NeoForge v${{ env.MC_VERSION }}-${{ needs.build.outputs.current }}
          version: ${{ needs.build.outputs.current }}
          version-type: release
          changelog: ${{ needs.build.outputs.changelog }}
          loaders: neoforge
          game-versions: 1.21.1
          java: 21
