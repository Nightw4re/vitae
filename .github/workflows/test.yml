name: Test

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v4
        with:
          java-version: 21
          distribution: temurin

      - name: Cache JaCoCo tools
        uses: actions/cache@v4
        with:
          path: .cache/jacoco-tools
          key: jacoco-0.8.12

      - name: Run tests
        run: npm test

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v4
        with:
          java-version: 21
          distribution: temurin

      - name: Cache JaCoCo tools
        uses: actions/cache@v4
        with:
          path: .cache/jacoco-tools
          key: jacoco-0.8.12

      - name: Run coverage
        run: npm run coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: jacoco-report
          path: build/reports/jacoco/html
